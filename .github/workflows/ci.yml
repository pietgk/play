name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      # Write access to the Nx Cloud remote cache + run recording.
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          filter: tree:0
          fetch-depth: 0

      # Same toolchain as local dev: node/pnpm/git come from the flake, pinned
      # by flake.lock. No setup-node — there is no second place to drift.
      - uses: DeterminateSystems/determinate-nix-action@v3

      # Warm the devShell once so later steps are instant.
      - run: nix develop -c node --version

      # Cache pnpm's content-addressed store across runs.
      - uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      # This enables task distribution via Nx Cloud.
      # Connect your workspace with "nx connect", then uncomment to distribute.
      # - run: nix develop -c pnpm exec nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e-ci"

      # Frozen install also re-verifies the supply-chain policy
      # (minimumReleaseAge / blockExoticSubdeps) on CI, not just locally.
      - run: nix develop -c pnpm install --frozen-lockfile

      # The verify gate (lint test build e2e) is defined once in package.json
      # so CI and the Sandcastle agent run the identical set — no gate drift.
      # When you enable task distribution, switch the `verify` script to e2e-ci.
      - run: nix develop -c pnpm verify

      # Nx Cloud recommends fixes for failures to help you get CI green faster.
      - run: nix develop -c pnpm exec nx fix-ci
        if: always()
