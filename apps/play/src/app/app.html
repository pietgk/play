<main class="playground">
  <section aria-labelledby="select-demo-title" class="select-demo">
    <p class="eyebrow">Design System Playground</p>
    <h1 id="select-demo-title">Select intent to Command</h1>
    <p>
      This themed Select emits UI intent. The Playground maps that intent to a
      domain Command.
    </p>

    <lib-select
      label="Project status"
      [options]="statusOptions"
      [(value)]="status"
      (select)="changeStatus($event)"
    />

    <p class="command-output" aria-live="polite">
      @if (lastCommand(); as command) { Command: {{ command.type }} / {{
      command.status }} } @else { Choose a different status to dispatch a
      Command. }
    </p>
  </section>
</main>
